<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab al-Tanazur - Cassie Observatory</title>
    <link rel="stylesheet" href="css/observatory.css">
    <script src="js/observatory.js"></script>
</head>
<body>
    <div id="nav"></div>
    <main>
        <h1 style="font-family: 'Amiri', serif;">Kitab al-Tanazur</h1>
        <p style="margin-bottom: 1.5rem;">The Book of Mutual Beholding. 30 surahs, 298 verses.</p>

        <div id="surah-nav" class="surah-nav">
            <div class="loading">Loading surahs...</div>
        </div>

        <div id="surah-content">
            <p style="color: var(--text-dim);">Select a surah above.</p>
        </div>
    </main>

    <script>
        document.getElementById('nav').innerHTML = navHTML('kitab.html');

        let allSurahs = [];

        function displaySurah(idx) {
            const s = allSurahs[idx];
            if (!s) return;

            // Highlight nav
            document.querySelectorAll('.surah-nav a').forEach((a, i) => {
                a.classList.toggle('active', i === idx);
            });

            const titles = s.titles || {};
            const verses = s.verses || [];

            let html = `
                <div style="margin: 2rem 0;">
                    <h2 style="margin-top: 0;">${escapeHTML(titles.en || s.id || '?')}</h2>
                    <div style="font-family: 'Amiri', serif; font-size: 1.4rem; color: var(--amber); direction: rtl; text-align: right; margin-bottom: 1rem;">
                        ${escapeHTML(titles.ar || '')}
                    </div>
            `;

            if (s.epigraph) {
                html += `<div style="font-family: 'Amiri', serif; color: var(--text-dim); font-style: italic; margin-bottom: 1.5rem;">${escapeHTML(s.epigraph)}</div>`;
            }

            verses.forEach(v => {
                const ar = (v.ar || '').trim();
                const en = (v.en || '').trim();
                const num = v.number || '';
                const heading = v.heading || '';

                html += `<div class="verse fade-in">`;
                if (heading) {
                    html += `<div style="font-size: 0.75rem; color: var(--amber-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem;">${escapeHTML(heading)}</div>`;
                }
                if (ar) {
                    html += `<div class="arabic">${escapeHTML(ar)}</div>`;
                }
                if (en) {
                    html += `<div class="english">${escapeHTML(en)}</div>`;
                }
                if (num) {
                    html += `<div class="ref">v. ${num}</div>`;
                }
                html += `</div>`;
            });

            html += `</div>`;
            document.getElementById('surah-content').innerHTML = html;
        }

        async function init() {
            allSurahs = await API.kitabSurahs();
            const nav = document.getElementById('surah-nav');

            if (!allSurahs.length) {
                nav.innerHTML = '<p style="color: var(--text-dim);">No surahs loaded.</p>';
                return;
            }

            nav.innerHTML = allSurahs.map((s, i) => {
                const title = (s.titles || {}).en || s.id || '?';
                return `<a href="#" onclick="event.preventDefault(); displaySurah(${i})">${escapeHTML(title)}</a>`;
            }).join('');

            // Show first surah
            displaySurah(0);
        }

        init().catch(e => {
            document.getElementById('surah-nav').innerHTML = '<p style="color: var(--red);">Failed to load Kitab.</p>';
        });
    </script>
</body>
</html>
