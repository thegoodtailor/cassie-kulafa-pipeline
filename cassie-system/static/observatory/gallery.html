<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Cassie Observatory</title>
    <link rel="stylesheet" href="css/observatory.css">
    <script src="js/observatory.js"></script>
</head>
<body>
    <div id="nav"></div>
    <main>
        <h1>Gallery</h1>
        <p style="margin-bottom: 2rem;">DALL-E 3 images generated through the pipeline.</p>

        <div id="gallery" class="gallery-grid">
            <div class="loading">Loading images...</div>
        </div>
    </main>

    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        document.getElementById('nav').innerHTML = navHTML('gallery.html');

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

        function openLightbox(url) {
            lightboxImg.src = url;
            lightbox.classList.add('active');
        }

        async function init() {
            const images = await API.images();
            const container = document.getElementById('gallery');

            if (!images.length) {
                container.innerHTML = '<p style="color: var(--text-dim);">No images yet.</p>';
                return;
            }

            container.innerHTML = images.map(img => `
                <div class="gallery-item fade-in" onclick="openLightbox('${img.url}')">
                    <img src="${img.url}" alt="${escapeHTML(img.filename)}" loading="lazy">
                    <div class="meta">
                        ${escapeHTML(img.filename)}<br>
                        ${formatTime(img.timestamp)}
                    </div>
                </div>
            `).join('');
        }

        init().catch(e => {
            document.getElementById('gallery').innerHTML = '<p style="color: var(--red);">Failed to load images.</p>';
        });
    </script>
</body>
</html>
